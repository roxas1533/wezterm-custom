name: Build Windows

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    env:
      CARGO_INCREMENTAL: "0"
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
      RUSTUP_WINDOWS_PATH_ADD_BIN: "1"

    steps:
      - name: "Checkout"
        uses: actions/checkout@v6
        with:
          submodules: "recursive"

      - name: "Install Rust"
        uses: dtolnay/rust-toolchain@stable
        with:
          target: "x86_64-pc-windows-msvc"

      - name: "Compile with sccache"
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: "Cache Cargo dependencies"
        uses: actions/cache@v4
        id: cache-cargo-vendor
        with:
          path: |
            vendor
            .cargo/config
          key: "cargo-deps-${{ hashFiles('**/Cargo.lock') }}"

      - name: "Vendor dependencies"
        if: steps.cache-cargo-vendor.outputs.cache-hit != 'true'
        shell: bash
        run: "cargo vendor --locked --versioned-dirs >> .cargo/config"

      - name: "Build (Release)"
        shell: cmd
        run: |
          PATH C:\Strawberry\perl\bin;%PATH%
          cargo build -p wezterm -p wezterm-gui -p wezterm-mux-server -p strip-ansi-escapes --release

      - name: "Package"
        shell: bash
        run: "bash ci/deploy.sh"

      - name: "Upload artifact"
        uses: actions/upload-artifact@v4
        with:
          name: "wezterm-windows"
          path: |
            WezTerm-*.zip
            WezTerm-*.exe
